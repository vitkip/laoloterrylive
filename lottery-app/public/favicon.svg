<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <clipPath id="c">
      <circle cx="24" cy="24" r="22"/>
    </clipPath>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#A67C1E"/>
      <stop offset="50%"  stop-color="#F5D77F"/>
      <stop offset="100%" stop-color="#A67C1E"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0F1326"/>
      <stop offset="50%"  stop-color="#1E2548"/>
      <stop offset="100%" stop-color="#0F1326"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFDF5"/>
      <stop offset="70%"  stop-color="#F3D072"/>
      <stop offset="100%" stop-color="#C99E32"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Ball body -->
  <g filter="url(#shadow)">
    <g clip-path="url(#c)">
      <rect x="0" y="0"    width="48" height="12"  fill="url(#gold)"/>
      <rect x="0" y="12"   width="48" height="24"  fill="url(#dark)"/>
      <rect x="0" y="36"   width="48" height="12"  fill="url(#gold)"/>
      <!-- Centre circle -->
      <circle cx="24" cy="24" r="8" fill="url(#dot)"/>
      <!-- Shine overlay -->
      <ellipse cx="19" cy="16" rx="9" ry="6" fill="url(#shine)"/>
    </g>
    <!-- Ball outline -->
    <circle cx="24" cy="24" r="22" fill="none" stroke="#C99E32" stroke-width="1.5"/>
  </g>
</svg>
